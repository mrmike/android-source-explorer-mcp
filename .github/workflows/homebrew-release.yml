name: Update Homebrew Formula

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag info
        id: tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${GITHUB_REF#refs/tags/}.tar.gz"
          
          # Download the source tarball to calculate sha256
          curl -L $URL -o source.tar.gz
          SHA256=$(sha256sum source.tar.gz | awk '{ print $1 }')
          
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "URL=$URL" >> $GITHUB_OUTPUT
          echo "SHA256=$SHA256" >> $GITHUB_OUTPUT

      - name: Update Formula
        run: |
          FORMULA_PATH="Formula/android-source-explorer.rb"
          VERSION="${{ steps.tag.outputs.VERSION }}"
          URL="${{ steps.tag.outputs.URL }}"
          SHA256="${{ steps.tag.outputs.SHA256 }}"
          HOMEPAGE="https://github.com/${{ github.repository }}"
          
          # Replace homepage, url, and sha256
          # Using different delimiters for sed to avoid escaping issues with URLs
          sed -i "s|homepage \".*\"|homepage \"$HOMEPAGE\"|" $FORMULA_PATH
          sed -i "s|url \".*\"|url \"$URL\"|" $FORMULA_PATH
          sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|" $FORMULA_PATH

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Formula/android-source-explorer.rb
          git commit -m "chore: update Homebrew formula for version ${{ steps.tag.outputs.VERSION }}"
          git push origin HEAD:main
